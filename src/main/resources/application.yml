spring:
  application:
    name: portfolio
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:portfolio}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:portfolio}
    password: ${DB_PASSWORD:Portfolio@123456}

server:
  port: ${SERVER_PORT:8080}

app:
  upload-path: ${APP_UPLOAD_PATH:./uploads/}
  upload-url-prefix: ${APP_UPLOAD_URL_PREFIX:/uploads}
  upload-date-subdir: ${APP_UPLOAD_DATE_SUBDIR:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true
  mapper-locations: classpath*:/mapper/**/*.xml
